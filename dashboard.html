<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

:root{
--bg:#f6f9fc;
--text:#1a1a1a;
--muted:#5f6b7a;
--primary:#0b84ff;
--primary2:#7b61ff;
--card:rgba(255,255,255,0.75);
--border:rgba(255,255,255,0.35);
--nav:rgba(255,255,255,0.65);
--shadow:0 10px 30px rgba(13,42,74,0.12);
}

body{
margin:0;
font-family:"Poppins",sans-serif;
background:linear-gradient(135deg,var(--bg),#eaf2ff);
color:var(--text);
}

body.dark-mode{
background:#0b1020;
color:white;
}

.dashboard-wrapper{
display:flex;
flex-direction:column;
min-height:100vh;
}

/* NAVBAR */

.dashboard-nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:var(--nav);
backdrop-filter:blur(12px);
border-bottom:1px solid var(--border);
}

.brand{
display:flex;
align-items:center;
gap:10px;
}

.brand-logo{
width:40px;
height:40px;
border-radius:12px;
display:grid;
place-items:center;
background:linear-gradient(135deg,var(--primary),var(--primary2));
color:white;
}

.theme-toggle{
width:40px;
height:40px;
border-radius:10px;
border:none;
cursor:pointer;
}

/* STATIC TABS */

.page-tabs{
display:flex;
gap:10px;
padding:15px 40px;
border-bottom:1px solid var(--border);
}

.page-tab{
padding:10px 20px;
border-radius:10px;
border:none;
background:#fff;
cursor:pointer;
font-weight:600;
background:linear-gradient(135deg,var(--primary),var(--primary2));
color:white;
}

.page-tab.active{
background:linear-gradient(135deg,var(--primary),var(--primary2));
color:white;
}

/* HEADER */

.dashboard-header{
padding:30px 40px 10px;
}

.dashboard-header h1{
margin:0;
font-size:28px;
}

.dashboard-header h2{
margin-top:5px;
font-weight:500;
color:blue;
}

/* KPI CARDS */

.kpi-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px 40px;
}

.kpi-card{
background:var(--card);
border-radius:15px;
padding:20px;
box-shadow:var(--shadow);
}

.kpi-card h3{
margin:0;
font-size:14px;
color:var(--muted);
}

.kpi-card p{
font-size:22px;
font-weight:700;
margin-top:5px;
}

/* DASHBOARD */

.dashboard-content{
padding:20px 40px;
}

.embed-container{
height:700px;
border-radius:20px;
overflow:hidden;
box-shadow:var(--shadow);
}

.embed-container iframe{
width:100%;
height:700px;
border:none;
}

</style>
</head>


<body>

<div class="dashboard-wrapper">

<nav class="dashboard-nav">

<div class="brand">
<div class="brand-logo">
<i class="fas fa-plane-departure"></i>
</div>
<h1>TravelScope</h1>
</div>

<button class="theme-toggle" onclick="toggleTheme()">
<i class="fas fa-moon"></i>
</button>

</nav>


<!-- STATIC BUTTONS -->

<div class="page-tabs">

<button class="page-tab active">
<i class="fas fa-chart-line"></i> Overview
</button>

<button class="page-tab">
<i class="fas fa-chart-pie"></i> Economic Insights
</button>

<button class="page-tab">
<i class="fas fa-calendar-alt"></i> Seasonality
</button>

<button class="page-tab">
<i class="fas fa-globe-americas"></i> Top 20 Destinations
</button>

</div>


<!-- HEADER -->

<div class="dashboard-header">
<h2>Overview Dashboard</h2>

</div>


<!-- DASHBOARD -->

<div class="dashboard-content">

<div class="embed-container">

<iframe src="https://app.powerbi.com/reportEmbed?reportId=6acc0859-8717-4c96-9fc9-29f380aed39e&autoAuth=true&ctid=77e5571b-20ed-4a8a-9109-38d31bb375a8&pageName=Page1"></iframe>

</div>

</div>

</div>


<script>

function toggleTheme(){
document.body.classList.toggle("dark-mode");

const icon=document.querySelector(".theme-toggle i");

if(document.body.classList.contains("dark-mode")){
icon.classList.remove("fa-moon");
icon.classList.add("fa-sun");
}else{
icon.classList.remove("fa-sun");
icon.classList.add("fa-moon");
}

}

</script>

</body>
</html>
