<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <!-- External CSS -->
  <link rel="stylesheet" href="style.css">

<style>

:root {
      --bg: #f6f9fc;
      --bg-soft: rgba(255, 255, 255, 0.7);
      --text: #1a1a1a;
      --muted: #5f6b7a;
      --primary: #0d7ef0;
      --primary-2: #7b61ff;
      --card: rgba(255, 255, 255, 0.75);
      --nav: rgba(255, 255, 255, 0.65);
      --border: rgba(255, 255, 255, 0.35);
      --shadow: 0 10px 30px rgba(13, 42, 74, 0.12);
      --hero-glow: rgba(11, 132, 255, 0.16);
    }

body{
margin:0;
font-family:"Poppins",sans-serif;
background:linear-gradient(135deg,var(--bg),#eaf2ff);
color:var(--text);
}

body.dark-mode{
background:#0b1020;
color:white;
}

/* STATIC TABS */

.page-tabs{
display:flex;
gap:10px;
padding:15px 40px;
border-bottom:1px solid var(--border);
}

.page-tab{
padding:10px 20px;
border-radius:10px;
border:none;
background:#fff;
cursor:pointer;
font-weight:600;
background:linear-gradient(135deg,var(--primary),var(--primary2));
color:rgb(12, 66, 227)
}

.page-tab.active{
background:linear-gradient(135deg,var(--primary),var(--primary2));
color:rgb(12, 66, 227);
}

/* HEADER */

.dashboard-header{
padding:30px 40px 10px;
}

.dashboard-header h1{
margin:0;
font-size:28px;
}

.dashboard-header h2{
margin-top:5px;
font-weight:500;
color:blue;
}

/* KPI CARDS */

.kpi-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px 40px;
}

.kpi-card{
background:var(--card);
border-radius:15px;
padding:20px;
box-shadow:var(--shadow);
}

.kpi-card h3{
margin:0;
font-size:14px;
color:var(--muted);
}

.kpi-card p{
font-size:22px;
font-weight:700;
margin-top:5px;
}

/* DASHBOARD */

.dashboard-content{
padding:20px 40px;
}

.embed-container{
height:700px;
border-radius:20px;
overflow:hidden;
box-shadow:var(--shadow);
}

.embed-container iframe{
width:100%;
height:700px;
border:none;
color:var(--primary)
}

</style>
</head>

<body>

  <div class="floating-bg"></div>

<nav>
    <div class="brand">
      <div class="brand-logo">T</div>
      <h1>TravelScope</h1>
    </div>

    <div class="nav-links" id="authArea">
      <a href="index.html">Home</a>
<a href="dashboard.html">Dashboard</a>
<a href="email-reports.html">Email Reports</a>

<button onclick="window.location.href='signup.html'">Sign Up</button>

<button onclick="window.location.href='login.html'">Login</button>

<button onclick="toggleMode()">🌙 / ☀️</button>

  </nav>

<!-- STATIC BUTTONS -->

<div class="page-tabs">

<button class="page-tab active">
<i class="fas fa-chart-line"></i> Overview
</button>

<button class="page-tab">
<i class="fas fa-chart-pie"></i> Economic Insights
</button>

<button class="page-tab">
<i class="fas fa-calendar-alt"></i> Seasonality
</button>

<button class="page-tab">
<i class="fas fa-globe-americas"></i> Top 20 Destinations
</button>

</div>


<!-- HEADER -->

<div class="dashboard-header">
<h2>Overview Dashboard</h2>

</div>


<!-- DASHBOARD -->

<div class="dashboard-content">

<div class="embed-container">

<iframe src="https://app.powerbi.com/reportEmbed?reportId=6acc0859-8717-4c96-9fc9-29f380aed39e&autoAuth=true&ctid=77e5571b-20ed-4a8a-9109-38d31bb375a8&pageName=Page1"></iframe>

</div>

</div>


<script>

document.addEventListener("DOMContentLoaded", function(){

const authArea = document.getElementById("authArea");

if(localStorage.getItem("isLoggedIn")==="true"){

const user = JSON.parse(localStorage.getItem("travelscope_user"));

// Keep the existing nav links and add profile icon on the right

authArea.innerHTML = `

<a href="index.html">Home</a>

<a href="dashboard.html">Dashboard</a>

<a href="ai-insights.html">AI Insights</a>

<a href="email-reports.html">Email Reports</a>

<button onclick="toggleMode()">🌙 / ☀️</button>

<div class="profile-wrapper">

<i class="fa fa-user-circle profile-icon" id="profileIcon"></i>

<div id="profileDetails" class="profile-details">

<p><strong>Name:</strong> ${user.name}</p>
<p><strong>Email:</strong> ${user.email}</p>
<p><strong>Contact:</strong> ${user.contact}</p>

<button onclick="logout()">Logout</button>

</div>

</div>

`;

const profileIcon = document.getElementById("profileIcon");
const profileDetails = document.getElementById("profileDetails");

profileDetails.style.display = "none";

profileIcon.addEventListener("click", function(){

if(profileDetails.style.display === "none"){
profileDetails.style.display = "block";
}else{
profileDetails.style.display = "none";
}

});

}

// Add active class to current page link

const currentPage = window.location.pathname.split('/').pop() || 'index.html';
const links = authArea.querySelectorAll('a[href]');
links.forEach(link => {
  if (link.getAttribute('href') === currentPage) {
    link.classList.add('active');
  }
});

});

function logout(){

localStorage.removeItem("isLoggedIn");

window.location.href="index.html";

}

function toggleMode() {
  document.body.classList.toggle("dark-mode");
}

</script>

</body>
</html>
