<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - TravelScope</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- External CSS -->
  <link rel="stylesheet" href="style.css">

  <style>
    .auth-container {
      min-height: calc(100vh - 80px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 42px;
      width: 100%;
      max-width: 420px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      animation: fadeUp 0.8s ease;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-header h2 {
      margin: 0 0 8px;
      font-size: 1.8rem;
      background: linear-gradient(135deg, var(--text), var(--primary-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .auth-header p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--text);
      font-size: 0.92rem;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(11, 132, 255, 0.15);
    }

    .form-group input::placeholder {
      color: var(--muted);
    }

    .auth-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: white;
      font-family: inherit;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      box-shadow: 0 12px 24px rgba(11, 132, 255, 0.25);
    }

    .auth-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 32px rgba(11, 132, 255, 0.3);
    }

    .auth-footer {
      text-align: center;
      margin-top: 24px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .auth-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.25s ease;
    }

    .auth-footer a:hover {
      color: var(--primary-2);
    }

    .error-message {
      background: rgba(255, 82, 82, 0.15);
      border: 1px solid rgba(255, 82, 82, 0.3);
      color: #ff5252;
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      display: none;
    }

    .success-message {
      background: rgba(76, 175, 80, 0.15);
      border: 1px solid rgba(76, 175, 80, 0.3);
      color: #4caf50;
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      display: none;
    }

    .password-input-wrapper {
      position: relative;
    }

    .password-input-wrapper input {
      padding-right: 45px;
    }

    .password-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.1rem;
      transition: color 0.25s ease;
    }

    .password-toggle:hover {
      color: var(--primary);
    }
  </style>
</head>
<body>

  <div class="floating-bg"></div>

  <nav>
    <div class="brand">
      <div class="brand-logo">T</div>
      <h1>TravelScope</h1>
    </div>

    <div class="nav-links">
      <button onclick="window.location.href='index.html'">Dashboard</button>
      <button>AI Insights</button>
      <button>Email Reports</button>
      <a href="login.html">Login</a>
      <button onclick="toggleMode()">🌙 / ☀️</button>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h2>Welcome Back</h2>
        <p>Login to access your TravelScope account</p>
      </div>

      <div id="errorMessage" class="error-message"></div>
      <div id="successMessage" class="success-message"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Gmail Address</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="Enter your gmail" 
            required 
            autocomplete="email"
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-input-wrapper">
            <input 
              type="password" 
              id="password" 
              name="password" 
              placeholder="Enter your password" 
              required 
              autocomplete="current-password"
            >
            <button type="button" class="password-toggle" onclick="togglePasswordVisibility('password')">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="auth-btn">Login</button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Sign up here</a>
      </div>
    </div>
  </div>

  <!-- External JS -->
  <script src="script.js"></script>

 <script>

document.addEventListener("DOMContentLoaded", function(){

const loginForm = document.getElementById("loginForm");

loginForm.addEventListener("submit", function(e){

e.preventDefault();

const email = document.getElementById("email").value.trim().toLowerCase();
const password = document.getElementById("password").value;

const errorMessage = document.getElementById("errorMessage");
const successMessage = document.getElementById("successMessage");

errorMessage.style.display = "none";
successMessage.style.display = "none";

/* Get stored user */
const storedUser = JSON.parse(localStorage.getItem("travelscope_user"));

/* Check if account exists */

if(!storedUser){
errorMessage.textContent = "No account found. Please sign up first.";
errorMessage.style.display = "block";
return;
}

/* Validate credentials */

if(email !== storedUser.email || password !== storedUser.password){

errorMessage.textContent = "Invalid email or password.";
errorMessage.style.display = "block";
return;

}

/* Login success */

localStorage.setItem("isLoggedIn","true");

/* Update travelscope_user with current user info (needed for index.html) */
localStorage.setItem("travelscope_user", JSON.stringify({
name: storedUser.name,
email: storedUser.email,
password: storedUser.password,
contact: storedUser.contact
}));

/* store current user info */
localStorage.setItem("currentUser", JSON.stringify({
name: storedUser.name,
email: storedUser.email,
contact: storedUser.contact
}));

successMessage.textContent = "Login successful! Redirecting...";
successMessage.style.display = "block";

/* redirect to home page */

setTimeout(function(){

window.location.href = "index.html";

},1200);

});

});

</script>
</body>
</html>
