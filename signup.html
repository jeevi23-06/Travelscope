<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - TravelScope</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- External CSS -->
  <link rel="stylesheet" href="style.css">

  <style>
    .auth-container {
      min-height: calc(100vh - 80px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 42px;
      width: 100%;
      max-width: 460px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      animation: fadeUp 0.8s ease;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .auth-header h2 {
      margin: 0 0 8px;
      font-size: 1.8rem;
      background: linear-gradient(135deg, var(--text), var(--primary-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .auth-header p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: var(--text);
      font-size: 0.92rem;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(11, 132, 255, 0.15);
    }

    .form-group input::placeholder {
      color: var(--muted);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 500px) {
      .form-row {
        grid-template-columns: 1fr;
      }
    }

    .auth-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: white;
      font-family: inherit;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      box-shadow: 0 12px 24px rgba(11, 132, 255, 0.25);
      margin-top: 8px;
    }

    .auth-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 32px rgba(11, 132, 255, 0.3);
    }

    .auth-footer {
      text-align: center;
      margin-top: 24px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .auth-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.25s ease;
    }

    .auth-footer a:hover {
      color: var(--primary-2);
    }

    .error-message {
      background: rgba(255, 82, 82, 0.15);
      border: 1px solid rgba(255, 82, 82, 0.3);
      color: #ff5252;
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      display: none;
    }

    .success-message {
      background: rgba(76, 175, 80, 0.15);
      border: 1px solid rgba(76, 175, 80, 0.3);
      color: #4caf50;
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      display: none;
    }

    .password-input-wrapper {
      position: relative;
    }

    .password-input-wrapper input {
      padding-right: 45px;
    }

    .password-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.1rem;
      transition: color 0.25s ease;
    }

    .password-toggle:hover {
      color: var(--primary);
    }

    .password-strength {
      margin-top: 8px;
      height: 4px;
      border-radius: 2px;
      background: var(--border);
      overflow: hidden;
    }

    .password-strength-bar {
      height: 100%;
      width: 0;
      transition: width 0.3s ease, background 0.3s ease;
    }

    .password-strength-text {
      font-size: 0.8rem;
      margin-top: 6px;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <div class="floating-bg"></div>

  <nav>
    <div class="brand">
      <div class="brand-logo">T</div>
      <h1>TravelScope</h1>
    </div>

    <div class="nav-links">
      <button onclick="window.location.href='index.html'">Dashboard</button>
      <button>AI Insights</button>
      <button>Email Reports</button>
      <a href="signup.html">Signup</a>
      <button onclick="toggleMode()">🌙 / ☀️</button>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h2>Create Account</h2>
        <p>Join TravelScope and start your journey</p>
      </div>

      <div id="errorMessage" class="error-message"></div>
      <div id="successMessage" class="success-message"></div>

      <form id="signupForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input 
            type="text" 
            id="name" 
            name="name" 
            placeholder="Enter your full name" 
            required 
            autocomplete="name"
          >
        </div>

        <div class="form-group">
          <label for="email">Gmail Address</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="Enter your gmail" 
            required 
            autocomplete="email"
          >
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="password">Create Password</label>
            <div class="password-input-wrapper">
              <input 
                type="password" 
                id="password" 
                name="password" 
                placeholder="Create a password" 
                required 
                autocomplete="new-password"
                oninput="checkPasswordStrength()"
              >
              <button type="button" class="password-toggle" onclick="togglePasswordVisibility('password')">
                <i class="fas fa-eye"></i>
              </button>
            </div>
            <div class="password-strength">
              <div class="password-strength-bar" id="strengthBar"></div>
            </div>
            <div class="password-strength-text" id="strengthText"></div>
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <div class="password-input-wrapper">
              <input 
                type="password" 
                id="confirmPassword" 
                name="confirmPassword" 
                placeholder="Confirm your password" 
                required 
                autocomplete="new-password"
              >
              <button type="button" class="password-toggle" onclick="togglePasswordVisibility('confirmPassword')">
                <i class="fas fa-eye"></i>
              </button>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="contact">Contact Number</label>
          <input 
            type="tel" 
            id="contact" 
            name="contact" 
            placeholder="Enter your contact number" 
            required 
            autocomplete="tel"
            pattern="[0-9+\-\s]{10,}"
          >
        </div>

        <button type="submit" class="auth-btn">Create Account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Login here</a>
      </div>
    </div>
  </div>

  <!-- External JS -->
  <script src="script.js"></script>

 <script>

document.getElementById("signupForm").addEventListener("submit",function(e){

e.preventDefault();

const name=document.getElementById("name").value.trim();
const email=document.getElementById("email").value.trim().toLowerCase();
const password=document.getElementById("password").value;
const confirmPassword=document.getElementById("confirmPassword").value;
const contact=document.getElementById("contact").value.trim();

const errorMessage=document.getElementById("errorMessage");
const successMessage=document.getElementById("successMessage");

errorMessage.style.display="none";
successMessage.style.display="none";

if(password!==confirmPassword){
errorMessage.textContent="Passwords do not match";
errorMessage.style.display="block";
return;
}

const userData={
name:name,
email:email,
password:password,
contact:contact
};

localStorage.setItem("travelscope_user",JSON.stringify(userData));

successMessage.textContent="Account created successfully! Redirecting to login...";
successMessage.style.display="block";

setTimeout(()=>{
window.location.href="login.html";
},2000);

});

</script>

</body>
</html>
